<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora Labs | Ingénierie Logicielle, IA & Cybersécurité - Lord Prime Nexus Dev</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Nexora Labs conçoit et développe des applications web/mobiles de haute performance, des solutions d'intelligence artificielle sur-mesure et des audits de cybersécurité offensifs. Fondé par Blessing Lusakumunu (Lord Prime Nexus Dev).">
    <meta name="keywords" content="Nexora Labs, ingénierie logicielle, RDC, Kinshasa, Blessing Lusakumunu, corporate, Next.js, React, Node.js, cybersécurité, Firebase, Tailwind CSS">
    <meta name="author" content="Blessing Lusakumunu (Lord Prime Nexus Dev)">
    
    <!-- Icons & Font Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Global Style Override Sheet -->
    <link rel="stylesheet" href="./style.css">

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Custom Tailwind Play CDN configuration to match corporate design variables
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#090d16',
                            900: '#101726',
                            800: '#172033',
                            700: '#1e283f'
                        },
                        blue: {
                            500: '#2563eb',
                            600: '#1d4ed8'
                        }
                    },
                    borderRadius: {
                        'md': '12px',
                        'lg': '24px'
                    }
                }
            }
        }
    </script>
</head>
<body class="dark-theme">

    <!-- Static Loader shown before React mounts -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-logo">N</div>
            <div class="loader-bar"><div class="loader-bar-fill"></div></div>
            <p class="loader-text">NEXORA LABS</p>
        </div>
    </div>

    <!-- Background Matrix Digital Nodes canvas -->
    <div class="bg-layer">
        <canvas id="particleCanvas"></canvas>
        <div class="glow-orb orb-primary"></div>
        <div class="glow-orb orb-secondary"></div>
    </div>

    <!-- React App Root Mounting Node -->
    <div id="root"></div>

    <!-- Firebase SDK Compat Core -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- React 18 & ReactDOM 18 Core Production Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel Standalone JSX Compiler for browser execution -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Database Connection Script -->
    <script src="./firebase-config.js"></script>

    <!-- React Main Component logic with Babel compilation -->
    <script type="text/babel" src="./app.js"></script>
</body>
</html>
