<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora Labs | Solutions Digitales Innovantes - Lord Prime Nexus Dev</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Nexora Labs - Développement web, mobile, IA, cybersécurité et solutions digitales innovantes par Blessing Lusakumunu (Lord Prime Nexus Dev)">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Icons Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="./style.css">

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind custom configuration matching requested premium color schemes
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#0a0a0f',
                            900: '#12121a',
                            800: '#1a1a2e',
                            700: '#2d1b4e'
                        },
                        purple: {
                            500: '#7c3aed'
                        },
                        cyan: {
                            500: '#06b6d4'
                        },
                        pink: {
                            500: '#ec4899'
                        },
                        coral: {
                            500: '#f43f5e'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
</head>
<body class="dark-theme select-none">

    <!-- Loading Animation (rotating 3D cube matching original style) -->
    <div class="loader" id="loader">
        <div class="loader-cube">
            <div class="loader-face"></div>
            <div class="loader-face"></div>
            <div class="loader-face"></div>
            <div class="loader-face"></div>
            <div class="loader-face"></div>
            <div class="loader-face"></div>
        </div>
    </div>

    <!-- Background Elements (grid pattern and floating colored blurred orbs) -->
    <div class="bg-grid"></div>
    <div class="bg-gradient-orb orb-1"></div>
    <div class="bg-gradient-orb orb-2"></div>
    <div class="bg-gradient-orb orb-3"></div>

    <!-- React Mounting node -->
    <div id="root"></div>

    <!-- Firebase SDK Compat Core -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- React 18 & ReactDOM 18 core libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel Standalone compiler -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Local Firebase Configuration -->
    <script src="./firebase-config.js"></script>

    <!-- Core React Application compiled with Babel -->
    <script type="text/babel" src="./app.js"></script>
